<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="200" y="75" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="64" font-weight="900" fill="#a6da95" filter="url(#glow)" letter-spacing="4">FROGMOG</text>
  <text x="200" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c6a0f6" letter-spacing="8">FROG ROYALE</text>
</svg>
